<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: linear-gradient(135deg, var(--bg-from, #0a0a0e) 0%, var(--bg-to, #1a1a24) 100%);
    color: #f2f2f2;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 80ms ease, color 80ms ease;
  }
  body.flash { background: #f2f2f2; color: #0e0e10; }

  .clock {
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    font-weight: 350;
    display: flex;
    align-items: baseline;
    justify-content: center;
    flex-wrap: nowrap;
    cursor: pointer;
    gap: 0.04em;
    padding: clamp(12px, 4vmin, 40px);
    width: 100%;
    max-width: 100vw;
  }
  .part, .sep {
    font-size: clamp(20px, 9vmin, 90px);
    color: #5a5a63;
    line-height: 1;
    transition: font-size 220ms cubic-bezier(.22,.61,.36,1), color 220ms ease;
  }
  .part.active {
    font-size: clamp(80px, 34vmin, 360px);
    color: #f2f2f2;
  }
  body.flash .part { color: #8a8a8a; }
  body.flash .part.active { color: #0e0e10; }
  body.flash .sep { color: #8a8a8a; }

  .settings-btn {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    right: max(14px, env(safe-area-inset-right));
    width: 40px; height: 40px;
    background: transparent;
    border: none;
    color: #6a6a73;
    font-size: 22px;
    cursor: pointer;
    border-radius: 50%;
    transition: color 150ms ease, background 150ms ease;
    z-index: 5;
  }
  .settings-btn:hover { color: #f2f2f2; background: rgba(255,255,255,0.05); }

  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0);
    pointer-events: none;
    transition: background 250ms ease;
    z-index: 9;
  }
  .backdrop.open {
    background: rgba(0, 0, 0, 0.45);
    pointer-events: auto;
  }
  .panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 320px; max-width: 90vw;
    background: #17171b;
    border-left: 1px solid #26262c;
    padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
    transform: translateX(100%);
    transition: transform 260ms cubic-bezier(.22,.61,.36,1);
    overflow-y: auto;
    z-index: 10;
  }
  @media (max-width: 380px) {
    .panel { padding: 18px 16px calc(18px + env(safe-area-inset-bottom)); }
    .row { margin-bottom: 16px; }
    .group button { padding: 9px 6px; font-size: 12px; }
  }
  .panel.open { transform: translateX(0); }
  .panel h2 {
    font-size: 11px; font-weight: 600; color: #8a8a93;
    margin-bottom: 20px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .row { margin-bottom: 22px; }
  .row label {
    display: block; font-size: 12px; color: #a8a8b0;
    margin-bottom: 8px; letter-spacing: 0.03em;
  }
  .group { display: flex; gap: 6px; }
  .group button {
    flex: 1;
    background: #1e1e24;
    border: 1px solid #2a2a32;
    color: #a8a8b0;
    padding: 11px 8px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 120ms ease;
    font-family: inherit;
  }
  .group button:hover { border-color: #3a3a42; color: #e0e0e6; }
  .group button.on {
    background: #f2f2f2;
    border-color: #f2f2f2;
    color: #0e0e10;
    font-weight: 500;
  }
  .close {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: none; border: none;
    color: #8a8a93; font-size: 22px; cursor: pointer;
    border-radius: 50%;
  }
  .close:hover { color: #f2f2f2; }
  .status {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    font-size: 10px;
    color: #4a4a53;
    text-align: center;
    letter-spacing: 0.2em;
    pointer-events: none;
  }
  .market-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4a4a53;
    margin-right: 6px;
    vertical-align: middle;
    transition: background 200ms ease;
  }
  .market-dot.live { background: #4ade80; }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px, 1.5vmin, 14px);
  }
  .date {
    font-variant-numeric: tabular-nums;
    font-size: clamp(18px, 3.6vmin, 32px);
    color: #7a7a83;
    letter-spacing: 0.18em;
    font-weight: 500;
    transition: color 220ms ease;
    display: inline-flex;
    align-items: baseline;
    gap: 0.6em;
  }
  .date .week {
    color: #a8a8b0;
    text-transform: uppercase;
  }
  body.flash .date { color: #5a5a63; }
  body.flash .date .week { color: #2a2a2f; }

  .countdown {
    font-variant-numeric: tabular-nums;
    font-size: clamp(20px, 4.5vmin, 40px);
    color: #4ade80;
    letter-spacing: 0.08em;
    font-weight: 500;
    transition: color 220ms ease;
  }
  .countdown[hidden] { display: none; }
  body.flash .countdown { color: #0e0e10; }

  .nikkei {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    letter-spacing: 0.04em;
    margin-top: clamp(2px, 0.8vmin, 10px);
    max-width: 96vw;
    line-height: 1.15;
  }
  .nikkei .label {
    font-size: clamp(9px, 1.4vmin, 11px);
    color: #8a8a93;
    letter-spacing: 0.22em;
    font-weight: 600;
  }
  .nikkei .price {
    font-size: clamp(14px, 2.8vmin, 22px);
    color: #f2f2f2;
    font-weight: 500;
  }
  .nikkei .change,
  .nikkei .pct {
    font-size: clamp(11px, 2.1vmin, 16px);
    color: #d8d8e0;
  }
  .nikkei.up .change,
  .nikkei.up .pct { color: #ffb4b4; }
  .nikkei.dn .change,
  .nikkei.dn .pct { color: #b4ffb4; }
  .nikkei.err .price { font-size: clamp(11px, 2vmin, 14px); color: #6a6a73; }
  .nikkei.err .change,
  .nikkei.err .pct { display: none; }
  body.flash .nikkei .label,
  body.flash .nikkei .price,
  body.flash .nikkei .change,
  body.flash .nikkei .pct { color: #1a1a20; }

  .closing-status {
    font-size: clamp(10px, 1.7vmin, 14px);
    color: #f59e0b;
    letter-spacing: 0.22em;
    font-weight: 600;
    margin-top: clamp(4px, 1vmin, 10px);
    animation: closingPulse 1.4s ease-in-out infinite;
  }
  .closing-status[hidden] { display: none; }
  @keyframes closingPulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }
  body.flash .closing-status { color: #b45309; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="date"><span id="dateYmd">　</span><span class="week" id="dateWeek"></span></div>
    <div class="countdown" id="countdown" hidden>開始まで <span id="cdSec">10</span>秒</div>
    <div class="clock" id="clock">
      <span class="part active" id="h">00</span>
      <span class="sep">:</span>
      <span class="part" id="m">00</span>
      <span class="sep">:</span>
      <span class="part" id="s">00</span>
    </div>
    <div class="nikkei err" id="nikkei">
      <span class="label">N225</span>
      <span class="price" id="nkPrice">取得中…</span>
      <span class="change" id="nkChange"></span>
      <span class="pct" id="nkPct"></span>
    </div>
    <div class="closing-status" id="closingStatus" hidden></div>
  </div>

  <button class="settings-btn" id="openSettings" aria-label="設定">⚙</button>

  <div class="backdrop" id="backdrop"></div>
  <div class="panel" id="panel" role="dialog" aria-label="設定">
    <button class="close" id="closeSettings" aria-label="閉じる">×</button>
    <h2>設定</h2>

    <div class="row">
      <label>点滅</label>
      <div class="group" data-key="blink">
        <button data-v="on">オン</button>
        <button data-v="off">オフ</button>
      </div>
    </div>

    <div class="row">
      <label>通知音</label>
      <div class="group" data-key="sound">
        <button data-v="beep">ピピッ</button>
        <button data-v="silent">無音</button>
      </div>
    </div>

    <div class="row">
      <label>間隔（市場時間 9:00–15:30）</label>
      <div class="group" data-key="interval">
        <button data-v="1">1分</button>
        <button data-v="3">3分</button>
        <button data-v="5">5分</button>
      </div>
    </div>

    <div class="row">
      <label>日経 音声通知（±1%ごと）</label>
      <div class="group" data-key="voice">
        <button data-v="on">オン</button>
        <button data-v="off">オフ</button>
      </div>
    </div>
  </div>

  <div class="status">
    <span class="market-dot" id="marketDot"></span>TOKYO / JST
  </div>

<script>
  const S = { activeIdx: 0, blink: 'on', interval: 3, sound: 'beep', voice: 'off' };
  try { Object.assign(S, JSON.parse(localStorage.getItem('tokyoClock') || '{}')); } catch {}
  if (S.sound !== 'beep' && S.sound !== 'silent') S.sound = 'beep';
  const cycle = ['h', 'm', 's', 'm'];
  if (typeof S.activeIdx !== 'number' || S.activeIdx < 0 || S.activeIdx >= cycle.length) {
    S.activeIdx = Math.max(0, cycle.indexOf(S.active));
  }
  S.active = cycle[S.activeIdx];
  const save = () => localStorage.setItem('tokyoClock', JSON.stringify(S));

  const tokyoFmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Tokyo',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  const tokyoDateFmt = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: '2-digit', day: '2-digit'
  });
  const tokyoWeekFmt = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Tokyo', weekday: 'short'
  });
  function tokyoParts() {
    const out = {};
    for (const p of tokyoFmt.formatToParts(new Date())) {
      if (p.type !== 'literal') out[p.type] = p.value;
    }
    if (out.hour === '24') out.hour = '00';
    return out;
  }
  function tokyoDateStr() {
    const now = new Date();
    const raw = tokyoDateFmt.format(now);
    return {
      raw,
      ymd: raw.replace(/-/g, '.'),
      week: tokyoWeekFmt.format(now)
    };
  }

  // TSE closures: JP national holidays + year-end/year-start closures (Jan 2-3, Dec 31)
  const HOLIDAYS_JP = new Set([
    '2026-01-01','2026-01-02',
    '2026-01-12','2026-02-11','2026-02-23',
    '2026-03-20','2026-04-29','2026-05-03',
    '2026-05-04','2026-05-05','2026-05-06',
    '2026-07-20','2026-08-11','2026-09-21',
    '2026-09-22','2026-09-23','2026-10-12',
    '2026-11-03','2026-11-23','2026-12-31',
    '2027-01-01',
    '2027-01-11','2027-02-11','2027-02-23',
    '2027-03-22','2027-04-29','2027-05-03',
    '2027-05-04','2027-05-05',
    '2027-07-19','2027-08-11','2027-09-20',
    '2027-09-23','2027-10-11',
    '2027-11-03','2027-11-23','2027-12-31',
  ]);

  function isMarketDay(weekShort, rawYmd) {
    if (weekShort === 'Sat' || weekShort === 'Sun') return false;
    return !HOLIDAYS_JP.has(rawYmd);
  }

  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  const dateYmdEl = document.getElementById('dateYmd');
  const dateWeekEl = document.getElementById('dateWeek');
  const marketDot = document.getElementById('marketDot');
  const countdownEl = document.getElementById('countdown');
  const cdSecEl = document.getElementById('cdSec');

  let lastMinute = null;
  let lastDateStr = '';
  let lastCountdownSec = null;

  function isMarketOpen(h, m) {
    const t = h * 60 + m;
    return t >= 540 && t <= 930; // 9:00 - 15:30
  }

  function render() {
    const t = tokyoParts();
    hEl.textContent = t.hour;
    mEl.textContent = t.minute;
    sEl.textContent = t.second;

    const d = tokyoDateStr();
    const key = d.ymd + d.week;
    if (key !== lastDateStr) {
      dateYmdEl.textContent = d.ymd;
      dateWeekEl.textContent = d.week;
      lastDateStr = key;
    }

    const h = +t.hour, m = +t.minute, sec = +t.second;
    const marketDay = isMarketDay(d.week, d.raw);
    const open = marketDay && isMarketOpen(h, m);
    marketDot.classList.toggle('live', open);

    if (marketDay && h === 8 && m === 59 && sec >= 50) {
      const remaining = 60 - sec;
      countdownEl.hidden = false;
      cdSecEl.textContent = remaining;
      if (lastCountdownSec !== remaining) {
        lastCountdownSec = remaining;
        if (S.sound === 'beep') playTick(remaining === 1);
      }
    } else if (!countdownEl.hidden) {
      countdownEl.hidden = true;
      lastCountdownSec = null;
    }

    if (lastMinute === null) {
      lastMinute = m;
    } else if (m !== lastMinute) {
      lastMinute = m;
      if (open && m % S.interval === 0) {
        if (S.blink === 'on') doBlink();
        if (S.sound === 'beep') playBeep();
      }
    }
  }

  function updateActive() {
    [hEl, mEl, sEl].forEach(el => el.classList.remove('active'));
    document.getElementById(S.active).classList.add('active');
  }

  // Tap anywhere (outside settings) to cycle
  let suppressClick = false;
  document.body.addEventListener('click', (e) => {
    if (suppressClick) { suppressClick = false; return; }
    if (e.target.closest('.settings-btn') || e.target.closest('.panel') || e.target.closest('.backdrop')) return;
    S.activeIdx = (S.activeIdx + 1) % cycle.length;
    S.active = cycle[S.activeIdx];
    updateActive();
    save();
    unlockAudio();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && panel.classList.contains('open')) closePanel();
  });

  // Swipe gestures: left = open settings, right = close settings
  let sx = null, sy = null;
  document.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    sx = t.clientX; sy = t.clientY;
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    if (sx === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    sx = null; sy = null;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.3) {
      suppressClick = true;
      if (dx < 0) openPanel();
      else closePanel();
    }
  }, { passive: true });

  // Audio
  let ctx = null;
  function unlockAudio() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  }
  function playBeep() {
    if (!ctx) return;
    const now = ctx.currentTime;
    [0, 0.13].forEach(off => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 2100;
      g.gain.setValueAtTime(0, now + off);
      g.gain.linearRampToValueAtTime(0.18, now + off + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now + off + 0.09);
      osc.connect(g).connect(ctx.destination);
      osc.start(now + off); osc.stop(now + off + 0.1);
    });
  }
  function playTick(isFinal) {
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = isFinal ? 2600 : 1400;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.15, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    osc.connect(g).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.09);
  }
  function doBlink() {
    document.body.classList.add('flash');
    setTimeout(() => document.body.classList.remove('flash'), 140);
  }

  // Settings panel
  const panel = document.getElementById('panel');
  const backdrop = document.getElementById('backdrop');
  function openPanel() {
    panel.classList.add('open');
    backdrop.classList.add('open');
    unlockAudio();
  }
  function closePanel() {
    panel.classList.remove('open');
    backdrop.classList.remove('open');
  }
  document.getElementById('openSettings').addEventListener('click', (e) => {
    e.stopPropagation();
    openPanel();
  });
  document.getElementById('closeSettings').addEventListener('click', closePanel);
  backdrop.addEventListener('click', closePanel);

  function bindGroups() {
    document.querySelectorAll('.group').forEach(group => {
      const key = group.dataset.key;
      const parse = key === 'interval' ? v => parseInt(v, 10) : v => v;
      const paint = () => group.querySelectorAll('button').forEach(b => {
        b.classList.toggle('on', b.dataset.v == S[key]);
      });
      group.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          S[key] = parse(btn.dataset.v);
          paint(); save();
        });
      });
      paint();
    });
  }

  bindGroups();
  updateActive();
  render();
  setInterval(render, 200);

  // ===== Nikkei 225 (^N225) =====
  const NK_ENDPOINT = 'https://nikkei-proxy.41morinaga.workers.dev/';
  const NK_GRAD = {
    base: { from: [10, 10, 14], to: [26, 26, 36] },
    up:   { from: [32, 4, 8],   to: [176, 16, 24] },
    dn:   { from: [6, 16, 42],  to: [24, 80, 192] },
  };
  const nkLerp = (a, b, t) => Math.round(a + (b - a) * t);
  const nkMix = (c0, c1, t) => `rgb(${nkLerp(c0[0],c1[0],t)},${nkLerp(c0[1],c1[1],t)},${nkLerp(c0[2],c1[2],t)})`;
  let nkLastBand = null;
  function nkSpeak(level) {
    if (!('speechSynthesis' in window)) return;
    const sign = level > 0 ? 'プラス' : 'マイナス';
    const u = new SpeechSynthesisUtterance(`日経 ${sign} ${Math.abs(level)} パーセント`);
    u.lang = 'ja-JP';
    u.rate = 1.0;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
  function nkCheckBand(pct) {
    if (!isFinite(pct)) return;
    const band = Math.trunc(pct);
    if (nkLastBand === null) { nkLastBand = band; return; }
    if (band !== nkLastBand) {
      if (S.voice === 'on' && band !== 0) nkSpeak(band);
      nkLastBand = band;
    }
  }
  function nkApplyGradient(pct) {
    const body = document.body;
    if (!isFinite(pct) || pct === 0) {
      body.style.removeProperty('--bg-from');
      body.style.removeProperty('--bg-to');
      return;
    }
    const intensity = Math.min(Math.abs(pct) / 5, 1);
    const target = pct > 0 ? NK_GRAD.up : NK_GRAD.dn;
    body.style.setProperty('--bg-from', nkMix(NK_GRAD.base.from, target.from, intensity));
    body.style.setProperty('--bg-to',   nkMix(NK_GRAD.base.to,   target.to,   intensity));
  }
  const nkEl = document.getElementById('nikkei');
  const nkPriceEl = document.getElementById('nkPrice');
  const nkChangeEl = document.getElementById('nkChange');
  const nkPctEl = document.getElementById('nkPct');
  const nkFmt = new Intl.NumberFormat('ja-JP', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  let nkLast = null;

  async function nkFetch() {
    const r = await fetch(NK_ENDPOINT, { cache: 'no-store' });
    if (!r.ok) throw new Error('http ' + r.status);
    const j = await r.json();
    const meta = j && j.chart && j.chart.result && j.chart.result[0] && j.chart.result[0].meta;
    if (!meta || typeof meta.regularMarketPrice !== 'number') throw new Error('bad data');
    const prev = (typeof meta.chartPreviousClose === 'number') ? meta.chartPreviousClose : meta.previousClose;
    return { price: meta.regularMarketPrice, prev };
  }

  function nkApply(d) {
    const change = d.price - d.prev;
    const pct = (change / d.prev) * 100;
    nkPriceEl.textContent = nkFmt.format(d.price);
    const sign = change >= 0 ? '+' : '−';
    nkChangeEl.textContent = sign + nkFmt.format(Math.abs(change));
    nkPctEl.textContent = sign + Math.abs(pct).toFixed(2) + '%';
    nkEl.classList.remove('err', 'up', 'dn');
    nkEl.classList.add(change >= 0 ? 'up' : 'dn');

    nkApplyGradient(pct);
    nkCheckBand(pct);
  }

  async function nkRefresh() {
    try {
      const d = await nkFetch();
      nkLast = d;
      nkApply(d);
    } catch (e) {
      if (!nkLast) {
        nkEl.classList.add('err');
        nkPriceEl.textContent = '取得失敗';
        nkChangeEl.textContent = '';
        nkPctEl.textContent = '';
      }
    }
  }
  function nkMarketOpenNow() {
    const t = tokyoParts();
    const d = tokyoDateStr();
    if (!isMarketDay(d.week, d.raw)) return false;
    return isMarketOpen(+t.hour, +t.minute);
  }
  const closingStatusEl = document.getElementById('closingStatus');
  function updateClosingStatus() {
    const t = tokyoParts();
    const d = tokyoDateStr();
    if (!isMarketDay(d.week, d.raw)) {
      if (!closingStatusEl.hidden) closingStatusEl.hidden = true;
      return;
    }
    const sec = (+t.hour) * 3600 + (+t.minute) * 60 + (+t.second);
    const T = (h, m, s) => h * 3600 + m * 60 + s;
    let label = null;
    if (sec >= T(15, 29, 0) && sec < T(15, 30, 30)) label = '引け処理中';
    else if (sec >= T(15, 30, 30) && sec < T(15, 35, 0)) label = '確定中';
    if (label) {
      if (closingStatusEl.textContent !== label) closingStatusEl.textContent = label;
      if (closingStatusEl.hidden) closingStatusEl.hidden = false;
    } else if (!closingStatusEl.hidden) {
      closingStatusEl.hidden = true;
    }
  }
  setInterval(updateClosingStatus, 500);
  updateClosingStatus();
  nkRefresh(); // always fetch once on load so closed-hours show last close
  setInterval(() => { if (nkMarketOpenNow()) nkRefresh(); }, 2000);
</script>
</body>
</html>
